<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧商品管理系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f8fafc;
        }
        .login-container {
            display: flex;
            min-height: 100vh;
        }
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }
        .login-left::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            top: -150px;
            right: -50px;
        }
        .login-left::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            bottom: -80px;
            left: -60px;
        }
        .brand-wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #fff;
        }
        .brand-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            backdrop-filter: blur(10px);
        }
        .brand-icon i { font-size: 36px; }
        .brand-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .brand-desc {
            font-size: 16px;
            opacity: 0.85;
            line-height: 1.7;
            max-width: 360px;
            margin: 0 auto;
        }
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            background: #fff;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            margin-bottom: 36px;
        }
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 14px;
            color: #94a3b8;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.2s;
            background: #fafbfc;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-input::placeholder { color: #cbd5e1; }
        .input-group { position: relative; }
        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 15px;
        }
        .input-group .form-input { padding-left: 44px; }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            cursor: pointer;
        }
        .form-options input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            accent-color: #667eea;
        }
        .form-options a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .form-options a:hover { text-decoration: underline; }
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-login:active { transform: translateY(0); }
        .alert-danger {
            padding: 12px 14px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 14px;
            background: #fff1f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-success {
            padding: 12px 14px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 14px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @media (max-width: 992px) {
            .login-left { display: none; }
            .login-right { padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="brand-wrapper">
                <div class="brand-icon">
                    <i class="fa-solid fa-store"></i>
                </div>
                <h2 class="brand-title">智慧商品管理系统</h2>
                <p class="brand-desc">高效管理商品信息，助力业务增长</p>
            </div>
        </div>
        <div class="login-right">
            <div class="login-card">
                <div class="login-header">
                    <h1>欢迎回来</h1>
                    <p>请登录您的账户</p>
                </div>
                <div th:if="${param.error}" class="alert-danger">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    用户名或密码错误，请重试。
                </div>
                <div th:if="${param.logout}" class="alert-success">
                    <i class="fa-solid fa-circle-check"></i>
                    您已成功退出登录。
                </div>
                <div th:if="${param.invalid}" class="alert-danger">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    登录会话已失效，请重新登录。
                </div>
                <div th:if="${param.expired}" class="alert-danger">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    登录已过期，请重新登录。
                </div>
                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" class="form-input" id="username" name="username"
                                   placeholder="请输入用户名" required autocomplete="username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="form-input" id="password" name="password"
                                   placeholder="请输入密码" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="form-options">
                        <label>
                            <input type="checkbox" id="remember" name="remember-me">
                            记住我
                        </label>
                        <a href="#">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn-login">
                        登录
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
