<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header i { color: var(--primary); }

        .card-body {
            padding: 24px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 10px 24px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 10px 24px;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            margin-bottom: 16px;
        }

        .alert i { font-size: 1rem; }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.88rem;
        }

        .setting-section {
            margin-bottom: 24px;
        }

        .setting-section:last-child {
            margin-bottom: 0;
        }

        .setting-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-title i { color: var(--primary); }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-gear"></i> 系统设置</h4>
</div>

<div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="fa-solid fa-circle-check"></i> <span th:text="${msg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-cog"></i> 系统信息
    </div>
    <div class="card-body">
        <div class="info-row">
            <span class="info-label">系统名称</span>
            <span class="info-value">智慧商品管理系统</span>
        </div>
        <div class="info-row">
            <span class="info-label">版本号</span>
            <span class="info-value">v1.0.0</span>
        </div>
        <div class="info-row">
            <span class="info-label">开发框架</span>
            <span class="info-value">Spring Boot 2.7.18</span>
        </div>
        <div class="info-row">
            <span class="info-label">数据库</span>
            <span class="info-value">MySQL</span>
        </div>
        <div class="info-row">
            <span class="info-label">模板引擎</span>
            <span class="info-value">Thymeleaf</span>
        </div>
        <div class="info-row">
            <span class="info-label">运行端口</span>
            <span class="info-value">9090</span>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-user-lock"></i> 安全设置
    </div>
    <div class="card-body">
        <form th:action="@{/system/updateSettings}" method="post">
            <div class="setting-section">
                <div class="setting-title">
                    <i class="fa-solid fa-lock"></i> 密码策略
                </div>
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label">密码最小长度</label>
                        <input type="number" class="form-control" name="minPasswordLength" value="6" min="4" max="32">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">密码最大长度</label>
                        <input type="number" class="form-control" name="maxPasswordLength" value="32" min="6" max="64">
                    </div>
                </div>
            </div>

            <div class="setting-section">
                <div class="setting-title">
                    <i class="fa-solid fa-eye"></i> 登录安全
                </div>
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label">登录失败锁定次数</label>
                        <input type="number" class="form-control" name="maxLoginAttempts" value="5" min="1" max="10">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">锁定时长（分钟）</label>
                        <input type="number" class="form-control" name="lockoutDuration" value="15" min="1" max="120">
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-save"></i> 保存设置
                </button>
                <button type="button" class="btn btn-outline-secondary" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right"></i> 重置
                </button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-database"></i> 数据管理
    </div>
    <div class="card-body">
        <div class="d-flex flex-wrap gap-3">
            <button type="button" class="btn btn-outline-secondary" onclick="confirm('备份功能开发中')">
                <i class="fa-solid fa-download"></i> 备份数据
            </button>
            <button type="button" class="btn btn-outline-secondary" onclick="confirm('恢复功能开发中')">
                <i class="fa-solid fa-upload"></i> 恢复数据
            </button>
            <button type="button" class="btn btn-outline-secondary" onclick="confirm('清理日志功能开发中')">
                <i class="fa-solid fa-trash"></i> 清理日志
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
