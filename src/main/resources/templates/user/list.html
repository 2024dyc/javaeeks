<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header i { color: var(--primary); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 20px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-sm {
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.82rem;
            transition: all 0.2s;
        }

        .btn-edit {
            color: var(--primary);
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.15);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-delete {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .table { margin-bottom: 0; font-size: 0.88rem; }

        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 14px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-primary);
        }

        .table-hover tbody tr:hover { background-color: #f8fafc; }

        .badge-role {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .badge-role.admin {
            background: rgba(102, 126, 234, 0.06);
            color: var(--primary);
            border-color: rgba(102, 126, 234, 0.1);
        }

        .badge-role.user {
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.1);
        }

        .badge-status {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .badge-status.enabled {
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.1);
        }

        .badge-status.disabled {
            background: rgba(107, 114, 128, 0.06);
            color: var(--text-muted);
            border-color: rgba(107, 114, 128, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            margin-bottom: 16px;
        }

        .alert i { font-size: 1rem; }

        .btn-toggle {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.78rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-toggle.enable {
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .btn-toggle.disable {
            background: rgba(239, 68, 68, 0.06);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-users"></i> 用户管理</h4>
    <a sec:authorize="hasRole('admin')" href="/user/form" class="btn btn-primary">
        <i class="fa-solid fa-plus"></i> 新增用户
    </a>
</div>

<div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="fa-solid fa-circle-check"></i> <span th:text="${msg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-list"></i> 用户列表
        <span class="badge bg-primary ms-auto" th:text="'共 ' + ${#lists.size(users)} + ' 人'">共 0 人</span>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th style="width: 60px;">ID</th>
                    <th>用户名</th>
                    <th style="width: 100px;">角色</th>
                    <th style="width: 100px;">状态</th>
                    <th style="width: 160px;">创建时间</th>
                    <th style="width: 160px;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="fa-solid fa-users-slash"></i>
                            <p>暂无用户数据</p>
                            <small>点击上方"新增用户"按钮添加用户</small>
                        </div>
                    </td>
                </tr>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.username}">用户名</td>
                    <td>
                        <span class="badge-role" th:classappend="${u.role == 'ROLE_admin'} ? 'admin' : 'user'">
                            <i th:if="${u.role == 'ROLE_admin'}" class="fa-solid fa-shield-halved"></i>
                            <i th:else class="fa-solid fa-user"></i>
                            <span th:text="${u.role == 'ROLE_admin'} ? '管理员' : '普通用户'"></span>
                        </span>
                    </td>
                    <td>
                        <span class="badge-status" th:classappend="${u.enabled == 1} ? 'enabled' : 'disabled'">
                            <i th:if="${u.enabled == 1}" class="fa-solid fa-circle-check"></i>
                            <i th:else class="fa-solid fa-circle-xmark"></i>
                            <span th:text="${u.enabled == 1} ? '已启用' : '已禁用'"></span>
                        </span>
                    </td>
                    <td th:text="${u.createTime != null ? #temporals.format(u.createTime, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                    <td>
                        <div class="btn-group">
                            <a sec:authorize="hasRole('admin')"
                               th:href="@{/user/form(id=${u.id})}" class="btn btn-sm btn-edit">
                                <i class="fa-solid fa-pen"></i> 编辑
                            </a>
                            <a sec:authorize="hasRole('admin')"
                               th:href="@{/user/toggleEnabled(id=${u.id}, enabled=${u.enabled == 1 ? 0 : 1})}"
                               class="btn btn-sm"
                               th:classappend="${u.enabled == 1} ? 'btn-outline-warning' : 'btn-outline-success'">
                                <i th:if="${u.enabled == 1}" class="fa-solid fa-pause"></i>
                                <i th:else class="fa-solid fa-play"></i>
                                <span th:text="${u.enabled == 1} ? '禁用' : '启用'"></span>
                            </a>
                            <a sec:authorize="hasRole('admin')"
                               th:href="@{/user/delete(id=${u.id})}"
                               class="btn btn-sm btn-delete"
                               onclick="return confirm('确认删除该用户？')">
                                <i class="fa-solid fa-trash"></i> 删除
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
