<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${user.id == null} ? '新增用户' : '编辑用户'">用户表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .card-body {
            padding: 28px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .form-label .required {
            color: #ef4444;
            margin-left: 2px;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 10px 24px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 10px 24px;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .form-hint {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
        }
    </style>
</head>
<body>

<div class="page-header">
    <h4>
        <i class="fa-solid fa-user"></i>
        <span th:text="${user.id == null} ? '新增用户' : '编辑用户'">新增用户</span>
    </h4>
</div>

<div class="card">
    <div class="card-body">
        <form th:action="@{/user/save}" method="post">
            <input type="hidden" name="id" th:if="${user.id != null}" th:value="${user.id}">

            <div class="row g-4">
                <div class="col-md-6">
                    <label for="username" class="form-label">
                        用户名 <span class="required">*</span>
                    </label>
                    <input type="text" class="form-control" id="username" name="username"
                           th:value="${user.username}" placeholder="请输入用户名" required>
                </div>

                <div class="col-md-6">
                    <label for="password" class="form-label">
                        密码 <span class="required">*</span>
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" th:required="${user.id == null}">
                    <span class="form-hint" th:if="${user.id != null}">不修改密码请留空</span>
                </div>

                <div class="col-md-6">
                    <label for="role" class="form-label">
                        角色 <span class="required">*</span>
                    </label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="">请选择角色</option>
                        <option value="ROLE_admin" th:selected="${user.role == 'ROLE_admin'}">管理员</option>
                        <option value="ROLE_user" th:selected="${user.role == 'ROLE_user'}">普通用户</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="enabled" class="form-label">
                        状态 <span class="required">*</span>
                    </label>
                    <select class="form-select" id="enabled" name="enabled" required>
                        <option value="1" th:selected="${user.enabled == null || user.enabled == 1}">启用</option>
                        <option value="0" th:selected="${user.enabled == 0}">禁用</option>
                    </select>
                </div>
            </div>

            <div class="d-flex gap-2 mt-5">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-check"></i> 保存
                </button>
                <a href="/user" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
