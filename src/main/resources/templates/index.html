<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧商品管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-sidebar: #ffffff;
            --bg-body: #f8fafc;
            --bg-header: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-body);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .sidebar {
            width: 240px;
            min-width: 240px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        .sidebar-logo .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sidebar-nav a i {
            width: 20px;
            margin-right: 12px;
            font-size: 0.95rem;
            text-align: center;
        }

        .sidebar-nav a:hover {
            color: var(--primary);
            background: rgba(102, 126, 234, 0.06);
        }

        .sidebar-nav a.active {
            color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
            font-weight: 600;
        }

        .sidebar-bottom {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
        }

        .main-content {
            margin-left: 240px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-header {
            background: var(--bg-header);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-title i { color: var(--primary); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-search {
            position: relative;
        }

        .header-search input {
            width: 220px;
            padding: 8px 14px 8px 36px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            background: #fafbfc;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .header-search input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .header-search i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #f1f5f9;
            border: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-icon-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px 6px 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-user:hover { background: #f8fafc; }

        .header-user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .header-user-info {
            display: flex;
            flex-direction: column;
        }

        .header-user-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-user-role {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .btn-logout {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.25);
        }

        .content-wrapper {
            flex: 1;
            padding: 20px;
            min-height: calc(100vh - 60px);
        }

        .content-wrapper iframe {
            width: 100%;
            height: calc(100vh - 100px);
            border: none;
            display: block;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            background: #fff;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <i class="fas fa-store-alt"></i>
            </div>
            <span class="logo-text">商品管理</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/welcome" data-menu="welcome" target="contentFrame">
                <i class="fas fa-home"></i><span>首页</span>
            </a>
            <div sec:authorize="hasRole('admin')">
                <a href="/product" data-menu="product" target="contentFrame">
                    <i class="fas fa-box"></i><span>商品管理</span>
                </a>
                <a href="/category" data-menu="category" target="contentFrame">
                    <i class="fas fa-tags"></i><span>分类管理</span>
                </a>
                <a href="/order" data-menu="order" target="contentFrame">
                    <i class="fas fa-receipt"></i><span>订单管理</span>
                </a>
                <a href="/user" data-menu="user" target="contentFrame">
                    <i class="fas fa-users"></i><span>用户管理</span>
                </a>
                <a href="/system/settings" data-menu="settings" target="contentFrame">
                    <i class="fas fa-gear"></i><span>系统设置</span>
                </a>
                <a href="/welcome" data-menu="reports" target="contentFrame">
                    <i class="fas fa-chart-bar"></i><span>统计报表</span>
                </a>
            </div>
            <div sec:authorize="hasRole('user')">
                <a href="/user-home" data-menu="user-home" target="contentFrame">
                    <i class="fas fa-home"></i><span>首页</span>
                </a>
                <a href="/cart" data-menu="cart" target="contentFrame">
                    <i class="fas fa-shopping-cart"></i><span>购物车</span>
                </a>
                <a href="/order" data-menu="order" target="contentFrame">
                    <i class="fas fa-receipt"></i><span>我的订单</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-bottom">
            <div style="text-align: center; color: var(--text-muted); font-size: 0.72rem;">
                <span>v1.0.0</span>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <header class="top-header">
            <div class="header-title">
                <i class="fas fa-store-alt"></i>智慧商品管理系统
            </div>
            <div class="header-right">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索商品、订单...">
                </div>
                <div class="header-icons">
                    <button class="header-icon-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="header-icon-btn">
                        <i class="fas fa-gear"></i>
                    </button>
                </div>
                <div class="header-user">
                    <div class="header-user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="header-user-info">
                        <span class="header-user-name" sec:authentication="name">用户</span>
                        <span class="header-user-role" sec:authentication="principal.authorities">管理员</span>
                    </div>
                </div>
                <a class="btn-logout" href="/logout">
                    <i class="fas fa-sign-out-alt"></i>退出
                </a>
            </div>
        </header>

        <div class="content-wrapper">
            <iframe id="contentFrame" name="contentFrame" src="/welcome"></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            var menuLinks = document.querySelectorAll('.sidebar-nav a');
            var iframe = document.getElementById('contentFrame');

            function setActiveMenu(src) {
                menuLinks.forEach(function(link) {
                    link.classList.remove('active');
                    var href = link.getAttribute('href');
                    if (src && href && src.indexOf(href) !== -1) {
                        link.classList.add('active');
                    }
                });
            }

            setActiveMenu(iframe.src);

            iframe.addEventListener('load', function() {
                var currentSrc;
                try {
                    currentSrc = iframe.contentWindow.location.href;
                } catch (e) {
                    currentSrc = iframe.src;
                }
                setActiveMenu(currentSrc);
            });

            menuLinks.forEach(function(link) {
                link.addEventListener('click', function() {
                    menuLinks.forEach(function(l) { l.classList.remove('active'); });
                    link.classList.add('active');
                });
            });
        })();
    </script>

</body>
</html>
