<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.06);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header i { color: var(--primary); }

        .search-card .card-body { padding: 24px; background: #fafbfc; }

        .search-card .form-label {
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-card .form-control,
        .search-card .form-select {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
        }

        .search-card .form-control:focus,
        .search-card .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 20px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 8px 20px;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-sm {
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.82rem;
            transition: all 0.2s;
        }

        .btn-view {
            color: var(--primary);
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.15);
        }

        .btn-view:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-status {
            color: var(--warning);
            background: rgba(245, 158, 11, 0.06);
            border: 1px solid rgba(245, 158, 11, 0.15);
        }

        .btn-status:hover {
            background: var(--warning);
            color: #fff;
            border-color: var(--warning);
        }

        .table { margin-bottom: 0; font-size: 0.88rem; }

        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 14px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-primary);
        }

        .table-hover tbody tr:hover { background-color: #f8fafc; }

        .price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1rem;
        }

        .order-no {
            font-family: 'Consolas', 'Monaco', monospace;
            font-weight: 600;
            color: var(--text-primary);
        }

        .product-names {
            font-size: 0.85rem;
            color: var(--text-secondary);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .empty-state small { font-size: 0.82rem; color: var(--text-muted); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.78rem;
            border: 1px solid var(--border-color);
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.06);
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.1);
        }

        .status-badge.paid {
            background: rgba(59, 130, 246, 0.06);
            color: var(--info);
            border-color: rgba(59, 130, 246, 0.1);
        }

        .status-badge.shipped {
            background: rgba(102, 126, 234, 0.06);
            color: var(--primary);
            border-color: rgba(102, 126, 234, 0.1);
        }

        .status-badge.completed {
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.1);
        }

        .status-badge.cancelled {
            background: rgba(107, 114, 128, 0.06);
            color: var(--text-muted);
            border-color: rgba(107, 114, 128, 0.1);
        }

        .pagination-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #fafbfc;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }

        .pagination-info {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .pagination-info strong { color: var(--primary); }

        .pagination { margin: 0; }

        .page-link {
            border: none;
            border-radius: 6px;
            margin: 0 3px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 8px 14px;
            transition: all 0.15s;
            background: #f1f5f9;
        }

        .page-link:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .page-item.active .page-link {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border-radius: 6px;
        }

        .page-item.disabled .page-link {
            background: #f8fafc;
            color: var(--text-muted);
        }

        .dropdown-menu {
            background: #fff;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            padding: 6px 0;
        }

        .dropdown-item {
            padding: 8px 14px;
            font-size: 0.85rem;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .dropdown-item:hover {
            background: rgba(102, 126, 234, 0.05);
            color: var(--primary);
        }

        .dropdown-item:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .dropdown-divider {
            margin: 6px 0;
            background-color: #f1f5f9;
        }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            margin-bottom: 16px;
        }

        .alert i { font-size: 1rem; }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-receipt"></i> 订单管理</h4>
</div>

<div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="fa-solid fa-circle-check"></i> <span th:text="${msg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="card search-card">
    <div class="card-header">
        <i class="fa-solid fa-search"></i> 搜索条件
    </div>
    <div class="card-body">
        <form th:action="@{/order}" method="get">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">订单号</label>
                    <input type="text" class="form-control" name="orderNo"
                           th:value="${orderNo}" placeholder="请输入订单号">
                </div>

                <div class="col-md-2">
                    <label class="form-label">状态</label>
                    <select class="form-select" name="status">
                        <option value="">全部状态</option>
                        <option value="0" th:selected="${status != null && status == 0}">待支付</option>
                        <option value="1" th:selected="${status != null && status == 1}">已支付</option>
                        <option value="2" th:selected="${status != null && status == 2}">已发货</option>
                        <option value="3" th:selected="${status != null && status == 3}">已完成</option>
                        <option value="4" th:selected="${status != null && status == 4}">已取消</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">开始日期</label>
                    <input type="date" class="form-control" name="startDate"
                           th:value="${startDate}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">结束日期</label>
                    <input type="date" class="form-control" name="endDate"
                           th:value="${endDate}">
                </div>

                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-search"></i> 查询
                        </button>
                        <a href="/order" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-rotate-right"></i> 重置
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-list"></i> 订单列表
        <span class="badge bg-primary ms-auto" th:text="'共 ' + ${pageInfo.total} + ' 条'" sec:if="${pageInfo != null}">共 0 条</span>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>订单号</th>
                    <th>用户</th>
                    <th>商品名称</th>
                    <th style="width: 90px;">总金额</th>
                    <th style="width: 100px;">状态</th>
                    <th style="width: 140px;">下单时间</th>
                    <th style="width: 140px;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${pageInfo == null || #lists.isEmpty(pageInfo.list)}">
                    <td colspan="7">
                        <div class="empty-state">
                            <i class="fa-solid fa-inbox"></i>
                            <p>暂无订单数据</p>
                            <small>订单将在用户下单后自动显示在此处</small>
                        </div>
                    </td>
                </tr>
                <tr th:each="o : ${pageInfo.list}">
                    <td>
                        <span class="order-no" th:text="${o.orderNo}">ORD202601010001</span>
                    </td>
                    <td th:text="${o.username}">用户名</td>
                    <td>
                        <div class="product-names" th:text="${o.productNames} ?: '未知商品'">商品名称</div>
                    </td>
                    <td class="price" th:text="'¥' + ${#numbers.formatDecimal(o.totalAmount, 1, 2)}">¥0.00</td>
                    <td>
                        <th:block th:switch="${o.status}">
                            <span th:case="0" class="status-badge pending">
                                <i class="fa-solid fa-clock"></i> 待支付
                            </span>
                            <span th:case="1" class="status-badge paid">
                                <i class="fa-solid fa-credit-card"></i> 已支付
                            </span>
                            <span th:case="2" class="status-badge shipped">
                                <i class="fa-solid fa-truck"></i> 已发货
                            </span>
                            <span th:case="3" class="status-badge completed">
                                <i class="fa-solid fa-circle-check"></i> 已完成
                            </span>
                            <span th:case="4" class="status-badge cancelled">
                                <i class="fa-solid fa-xmark"></i> 已取消
                            </span>
                        </th:block>
                    </td>
                    <td th:text="${#temporals.format(o.createTime, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</td>
                    <td>
                        <div class="btn-group">
                            <a sec:authorize="hasRole('admin')"
                               th:href="@{/order/detail(id=${o.id})}"
                               class="btn btn-sm btn-view">
                                <i class="fa-solid fa-eye"></i> 详情
                            </a>
                            <div sec:authorize="hasRole('admin')" class="dropdown">
                                <button class="btn btn-sm btn-status dropdown-toggle"
                                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fa-solid fa-pen"></i> 状态
                                </button>
                                <ul class="dropdown-menu">
                                    <li>
                                        <form th:action="@{/order/updateStatus}" method="post" style="margin: 0;">
                                            <input type="hidden" name="id" th:value="${o.id}">
                                            <input type="hidden" name="status" value="1">
                                            <button type="submit" class="dropdown-item" th:disabled="${o.status == 1}">
                                                <i class="fa-solid fa-credit-card text-info"></i> 已支付
                                            </button>
                                        </form>
                                    </li>
                                    <li>
                                        <form th:action="@{/order/updateStatus}" method="post" style="margin: 0;">
                                            <input type="hidden" name="id" th:value="${o.id}">
                                            <input type="hidden" name="status" value="2">
                                            <button type="submit" class="dropdown-item" th:disabled="${o.status == 2}">
                                                <i class="fa-solid fa-truck text-primary"></i> 已发货
                                            </button>
                                        </form>
                                    </li>
                                    <li>
                                        <form th:action="@{/order/updateStatus}" method="post" style="margin: 0;">
                                            <input type="hidden" name="id" th:value="${o.id}">
                                            <input type="hidden" name="status" value="3">
                                            <button type="submit" class="dropdown-item" th:disabled="${o.status == 3}">
                                                <i class="fa-solid fa-circle-check text-success"></i> 已完成
                                            </button>
                                        </form>
                                    </li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <form th:action="@{/order/updateStatus}" method="post" style="margin: 0;">
                                            <input type="hidden" name="id" th:value="${o.id}">
                                            <input type="hidden" name="status" value="4">
                                            <button type="submit" class="dropdown-item" th:disabled="${o.status == 4}">
                                                <i class="fa-solid fa-xmark text-secondary"></i> 已取消
                                            </button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination-wrapper" th:if="${pageInfo != null && pageInfo.total > 0}">
        <div class="pagination-info">
            共 <strong th:text="${pageInfo.total}">0</strong> 条记录，
            当前第 <strong th:text="${pageInfo.pageNum}">1</strong> / <strong th:text="${pageInfo.pages}">1</strong> 页
        </div>

        <nav>
            <ul class="pagination">
                <li class="page-item" th:classappend="${pageInfo.isFirstPage} ? 'disabled'">
                    <a class="page-link" th:if="${!pageInfo.isFirstPage}"
                       th:href="@{/order(orderNo=${orderNo}, status=${status}, startDate=${startDate}, endDate=${endDate}, pageNum=${pageInfo.pageNum - 1})}">
                        <i class="fa-solid fa-angle-left"></i>
                    </a>
                    <span class="page-link" th:if="${pageInfo.isFirstPage}">
                        <i class="fa-solid fa-angle-left"></i>
                    </span>
                </li>

                <li class="page-item"
                    th:each="num : ${pageInfo.navigatepageNums}"
                    th:classappend="${num == pageInfo.pageNum} ? 'active'">
                    <a class="page-link" th:text="${num}"
                       th:href="@{/order(orderNo=${orderNo}, status=${status}, startDate=${startDate}, endDate=${endDate}, pageNum=${num})}">
                        1
                    </a>
                </li>

                <li class="page-item" th:classappend="${pageInfo.isLastPage} ? 'disabled'">
                    <a class="page-link" th:if="${!pageInfo.isLastPage}"
                       th:href="@{/order(orderNo=${orderNo}, status=${status}, startDate=${startDate}, endDate=${endDate}, pageNum=${pageInfo.pageNum + 1})}">
                        <i class="fa-solid fa-angle-right"></i>
                    </a>
                    <span class="page-link" th:if="${pageInfo.isLastPage}">
                        <i class="fa-solid fa-angle-right"></i>
                    </span>
                </li>
            </ul>
        </nav>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
