<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 8px 20px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header-title i { color: var(--primary); }

        .card-body {
            padding: 24px;
        }

        .order-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .order-info-item {
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .order-info-item .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        .order-info-item .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .price-value {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .table {
            margin-bottom: 0;
            font-size: 0.88rem;
        }

        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 14px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-primary);
        }

        .table tfoot td {
            padding: 14px;
            font-weight: 600;
            background: #fafbfc;
            border-top: 1px solid var(--border-color);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.78rem;
            border: 1px solid var(--border-color);
        }

        .status-badge.pending { background: rgba(245, 158, 11, 0.06); color: var(--warning); }
        .status-badge.paid { background: rgba(59, 130, 246, 0.06); color: var(--info); }
        .status-badge.shipped { background: rgba(102, 126, 234, 0.06); color: var(--primary); }
        .status-badge.completed { background: rgba(16, 185, 129, 0.06); color: var(--success); }
        .status-badge.cancelled { background: rgba(107, 114, 128, 0.06); color: var(--text-muted); }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-receipt"></i> 订单详情</h4>
    <a href="/order" class="btn btn-outline-secondary">
        <i class="fa-solid fa-arrow-left"></i> 返回订单列表
    </a>
</div>

<div class="card">
    <div class="card-body">
        <h6 class="card-header-title mb-4">
            <i class="fa-solid fa-circle-info"></i> 订单信息
        </h6>
        <div class="order-info-grid">
            <div class="order-info-item">
                <span class="label">订单号</span>
                <span class="value" th:text="${order.orderNo}">ORD202601010001</span>
            </div>
            <div class="order-info-item">
                <span class="label">用户</span>
                <span class="value" th:text="${order.username}">用户名</span>
            </div>
            <div class="order-info-item">
                <span class="label">状态</span>
                <span class="value">
                    <th:block th:switch="${order.status}">
                        <span th:case="0" class="status-badge pending">
                            <i class="fa-solid fa-clock"></i> 待支付
                        </span>
                        <span th:case="1" class="status-badge paid">
                            <i class="fa-solid fa-credit-card"></i> 已支付
                        </span>
                        <span th:case="2" class="status-badge shipped">
                            <i class="fa-solid fa-truck"></i> 已发货
                        </span>
                        <span th:case="3" class="status-badge completed">
                            <i class="fa-solid fa-circle-check"></i> 已完成
                        </span>
                        <span th:case="4" class="status-badge cancelled">
                            <i class="fa-solid fa-xmark"></i> 已取消
                        </span>
                    </th:block>
                </span>
            </div>
            <div class="order-info-item">
                <span class="label">总金额</span>
                <span class="price-value" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">¥0.00</span>
            </div>
            <div class="order-info-item">
                <span class="label">下单时间</span>
                <span class="value" th:text="${#temporals.format(order.createTime, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <h6 class="card-header-title px-4 pt-4 pb-2">
            <i class="fa-solid fa-list-ul"></i> 商品明细
        </h6>
        <table class="table">
            <thead>
                <tr>
                    <th>商品名称</th>
                    <th>单价</th>
                    <th>数量</th>
                    <th>小计</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.productName}">商品名称</td>
                    <td class="text-muted" th:text="'¥' + ${#numbers.formatDecimal(item.price, 1, 2)}">¥0.00</td>
                    <td th:text="${item.quantity}">1</td>
                    <td class="price-value" style="font-size: 0.95rem;"
                        th:text="'¥' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">¥0.00</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3" class="text-end">合计：</td>
                    <td class="price-value" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">¥0.00</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
