<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header i { color: var(--primary); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 10px 24px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 10px 24px;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: var(--danger);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 16px;
            transition: all 0.2s;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
            color: #fff;
        }

        .cart-item {
            display: flex;
            padding: 20px;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
            gap: 20px;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-img {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .cart-item-info {
            flex: 1;
            min-width: 0;
        }

        .cart-item-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 8px;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cart-item-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .cart-item-stock {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #f8fafc;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .qty-input {
            width: 50px;
            height: 32px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .qty-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
        }

        .cart-item-total {
            min-width: 100px;
            text-align: right;
        }

        .cart-item-total-price {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            display: block;
        }

        .cart-item-actions {
            min-width: 80px;
            text-align: right;
        }

        .btn-remove {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.15);
            background: rgba(239, 68, 68, 0.06);
            color: var(--danger);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .empty-state h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state p {
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .cart-footer {
            background: #fafbfc;
            border-top: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cart-footer-left {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .cart-footer-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .cart-total {
            text-align: right;
        }

        .cart-total-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: block;
        }

        .cart-total-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.06);
            color: #10b981;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.06);
            color: var(--danger);
        }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-shopping-cart"></i> 购物车</h4>
    <a href="/product" class="btn btn-outline-secondary">
        <i class="fa-solid fa-arrow-left"></i> 继续购物
    </a>
</div>

<div th:if="${msg}" class="alert alert-success">
    <i class="fa-solid fa-circle-check"></i> <span th:text="${msg}"></span>
</div>

<div th:if="${error}" class="alert alert-danger">
    <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
</div>

<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-list"></i> 购物车商品
        <span class="badge bg-primary ms-auto" th:text="'共 ' + ${totalCount} + ' 件'" style="font-size:0.75rem;">共 0 件</span>
    </div>
    <div class="card-body p-0">
        <div th:if="${#lists.isEmpty(items)}">
            <div class="empty-state">
                <i class="fa-solid fa-shopping-cart"></i>
                <h3>购物车是空的</h3>
                <p>快去挑选心仪的商品吧</p>
                <a href="/product" class="btn btn-primary">
                    <i class="fa-solid fa-arrow-right"></i> 去购物
                </a>
            </div>
        </div>
        <div th:each="item : ${items}">
            <div class="cart-item">
                <img th:src="${item.productImage != null and !item.productImage.isEmpty()} ? ${item.productImage} : @{/images/no-image.png}"
                     class="cart-item-img" alt="商品图片">
                <div class="cart-item-info">
                    <span class="cart-item-name" th:text="${item.productName}">商品名称</span>
                    <span class="cart-item-price">¥<span th:text="${#numbers.formatDecimal(item.price, 1, 2)}">0.00</span></span>
                    <span class="cart-item-stock">库存: <span th:text="${item.stock}">0</span></span>
                </div>
                <div class="cart-item-quantity">
                    <button class="qty-btn"
                            th:onclick="'window.location.href=\'/cart/update?id=' + ${item.id} + '&quantity=' + (${item.quantity} > 1 ? ${item.quantity - 1} : 1) + '\''">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <input type="number" class="qty-input" th:value="${item.quantity}" readonly>
                    <button class="qty-btn"
                            th:onclick="'window.location.href=\'/cart/update?id=' + ${item.id} + '&quantity=' + (${item.quantity} < ${item.stock} ? ${item.quantity + 1} : ${item.stock}) + '\''">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div class="cart-item-total">
                    <span class="cart-item-total-price">¥<span th:text="${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}">0.00</span></span>
                </div>
                <div class="cart-item-actions">
                    <button class="btn-remove" th:onclick="'window.location.href=\'/cart/delete?id=' + ${item.id} + '\''">
                        <i class="fa-solid fa-trash"></i> 删除
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${!#lists.isEmpty(items)}" class="cart-footer">
        <div class="cart-footer-left">
            <button class="btn btn-outline-secondary" th:onclick="'window.location.href=\'/cart/clear\''">
                <i class="fa-solid fa-trash"></i> 清空购物车
            </button>
            <a href="/product" class="btn btn-outline-secondary">
                <i class="fa-solid fa-shopping-bag"></i> 继续购物
            </a>
        </div>
        <div class="cart-footer-right">
            <div class="cart-total">
                <span class="cart-total-label">合计金额</span>
                <span class="cart-total-price">¥<span th:text="${#numbers.formatDecimal(totalPrice, 1, 2)}">0.00</span></span>
            </div>
            <a href="/cart/checkout" class="btn btn-primary">
                <i class="fa-solid fa-credit-card"></i> 去结算
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
