<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算订单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header i { color: var(--primary); }

        .card-body {
            padding: 24px;
        }

        .order-item {
            display: flex;
            padding: 16px 0;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
            gap: 16px;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: block;
        }

        .order-item-price {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
            display: block;
        }

        .order-item-quantity {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .order-summary {
            background: #fafbfc;
            border-radius: 8px;
            padding: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9rem;
        }

        .summary-row.label {
            color: var(--text-secondary);
        }

        .summary-row.total {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            border-top: 1px dashed var(--border-color);
            margin-top: 8px;
            padding-top: 12px;
        }

        .summary-row.total .amount {
            color: var(--primary);
            font-size: 1.4rem;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
            width: 100%;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 12px 32px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
            font-size: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 12px 24px;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .alert-success {
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            color: #10b981;
            margin-bottom: 16px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: #fff;
            font-size: 3rem;
        }

        .success-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }

        .success-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-credit-card"></i> 结算订单</h4>
</div>

<div class="row g-4">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-map-marker-alt"></i> 收货地址
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">收货人</label>
                    <input type="text" class="form-control" placeholder="请输入收货人姓名">
                </div>
                <div class="mb-3">
                    <label class="form-label">联系电话</label>
                    <input type="tel" class="form-control" placeholder="请输入联系电话">
                </div>
                <div class="mb-3">
                    <label class="form-label">收货地址</label>
                    <textarea class="form-control" rows="3" placeholder="请输入详细地址"></textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-box"></i> 商品清单
            </div>
            <div class="card-body p-0">
                <div th:each="item : ${items}">
                    <div class="order-item">
                        <img th:src="${item.productImage != null and !item.productImage.isEmpty()} ? ${item.productImage} : @{/images/no-image.png}"
                             class="order-item-img" alt="商品图片">
                        <div class="order-item-info">
                            <span class="order-item-name" th:text="${item.productName}">商品名称</span>
                            <span class="order-item-price">¥<span th:text="${#numbers.formatDecimal(item.price, 1, 2)}">0.00</span></span>
                        </div>
                        <div class="order-item-quantity">x <span th:text="${item.quantity}">1</span></div>
                        <div style="font-weight:600;color:var(--text-primary);">
                            ¥<span th:text="${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}">0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-file-invoice"></i> 订单信息
            </div>
            <div class="card-body">
                <div class="order-summary">
                    <div class="summary-row label">
                        <span>商品数量</span>
                        <span><span th:text="${totalCount}">0</span> 件</span>
                    </div>
                    <div class="summary-row label">
                        <span>商品总价</span>
                        <span>¥<span th:text="${#numbers.formatDecimal(totalPrice, 1, 2)}">0.00</span></span>
                    </div>
                    <div class="summary-row label">
                        <span>运费</span>
                        <span>¥0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>应付金额</span>
                        <span class="amount">¥<span th:text="${#numbers.formatDecimal(totalPrice, 1, 2)}">0.00</span></span>
                    </div>
                </div>

                <div class="action-buttons" style="margin-top:24px;">
                    <a href="/cart" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-arrow-left"></i> 返回购物车
                    </a>
                    <button type="button" class="btn btn-primary" onclick="submitOrder()">
                        <i class="fa-solid fa-check"></i> 提交订单
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function submitOrder() {
        alert('订单提交成功！');
        window.location.href = '/order/success';
    }
</script>

</body>
</html>
