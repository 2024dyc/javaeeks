<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 权限不足</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdf2f2 0%, #fef5f5 50%, #fce4e4 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        .error-card {
            text-align: center;
            background: #fff;
            border-radius: 12px;
            padding: 50px 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            max-width: 480px;
            width: 100%;
        }

        .error-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #fdeaea, #f8d7da);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-icon i {
            font-size: 46px;
            color: #e74c3c;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: #343a40;
            margin-bottom: 8px;
        }

        .error-code {
            font-size: 14px;
            font-weight: 600;
            color: #e74c3c;
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .error-desc {
            font-size: 15px;
            color: #6c757d;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 28px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: #c0392b;
            color: #fff;
        }

        .btn-back {
            background: #fff;
            color: #e74c3c;
            border: 2px solid #e74c3c;
            border-radius: 10px;
            padding: 10px 28px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: #fdeaea;
            color: #c0392b;
            border-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="error-card">
    <!-- 锁图标 -->
    <div class="error-icon">
        <i class="fa-solid fa-lock"></i>
    </div>

    <!-- 标题 -->
    <div class="error-code">403 FORBIDDEN</div>
    <div class="error-title">403 - 权限不足</div>

    <!-- 描述 -->
    <div class="error-desc">
        抱歉，您没有权限访问此页面
    </div>

    <!-- 按钮 -->
    <div class="error-actions">
        <a href="/index" class="btn-home">
            <i class="fa-solid fa-house"></i> 返回首页
        </a>
        <a href="javascript:history.back()" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> 返回上一页
        </a>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
