<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.06);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 20px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-sm {
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.82rem;
            transition: all 0.2s;
        }

        .btn-edit {
            color: var(--primary);
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.15);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-delete {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
        }

        .card-header i { color: var(--primary); }

        .view-toggle { display: flex; gap: 6px; }

        .view-btn {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 5px 10px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .view-btn.active, .view-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }

        .stat-card:hover { box-shadow: var(--shadow-md); }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .stat-icon.blue { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: #fff; }
        .stat-icon.green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; }
        .stat-icon.orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: #fff; }
        .stat-icon.purple { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; }

        .stat-info {}

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-card .card-body { padding: 24px; background: #fafbfc; }

        .search-card .form-label {
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-card .form-control {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
        }

        .search-card .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .table { margin-bottom: 0; font-size: 0.88rem; }

        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 14px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-primary);
        }

        .table-hover tbody tr:hover { background-color: #f8fafc; }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding: 20px;
        }

        .category-item {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .category-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
        }

        .category-item:hover { box-shadow: var(--shadow-md); }

        .category-item .category-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin: 0 auto 12px;
        }

        .category-item .category-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: block;
        }

        .category-item .category-count {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .category-item .category-date {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: block;
        }

        .category-item .category-actions {
            display: flex;
            justify-content: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .category-item:hover .category-actions { opacity: 1; }

        .color-1::before { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        .color-1 .category-icon { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: #fff; }

        .color-2::before { background: linear-gradient(90deg, #10b981, #059669); }
        .color-2 .category-icon { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; }

        .color-3::before { background: linear-gradient(90deg, #f97316, #ea580c); }
        .color-3 .category-icon { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: #fff; }

        .color-4::before { background: linear-gradient(90deg, var(--primary), var(--primary-dark)); }
        .color-4 .category-icon { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; }

        .color-5::before { background: linear-gradient(90deg, #ec4899, #db2777); }
        .color-5 .category-icon { background: linear-gradient(135deg, #ec4899 0%, #db2777 100%); color: #fff; }

        .color-6::before { background: linear-gradient(90deg, #06b6d4, #0891b2); }
        .color-6 .category-icon { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); color: #fff; }

        .color-7::before { background: linear-gradient(90deg, #6b7280, #4b5563); }
        .color-7 .category-icon { background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%); color: #fff; }

        .color-8::before { background: linear-gradient(90deg, #f59e0b, #d97706); }
        .color-8 .category-icon { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #fff; }

        .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            transition: transform 0.2s;
            border: 1px solid var(--border-color);
        }

        .tag-color-1 { background: rgba(59, 130, 246, 0.06); color: #3b82f6; }
        .tag-color-2 { background: rgba(16, 185, 129, 0.06); color: #10b981; }
        .tag-color-3 { background: rgba(249, 115, 22, 0.06); color: #f97316; }
        .tag-color-4 { background: rgba(102, 126, 234, 0.06); color: var(--primary); }
        .tag-color-5 { background: rgba(236, 72, 153, 0.06); color: #ec4899; }
        .tag-color-6 { background: rgba(6, 182, 212, 0.06); color: #06b6d4; }
        .tag-color-7 { background: rgba(107, 114, 128, 0.06); color: #6b7280; }
        .tag-color-8 { background: rgba(245, 158, 11, 0.06); color: #f59e0b; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .empty-state small { font-size: 0.82rem; color: var(--text-muted); }

        .modal-content {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border-radius: 12px 12px 0 0;
            padding: 20px;
            border-bottom: none;
        }

        .modal-header .modal-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0;
        }

        .modal-header .btn-close {
            color: #fff;
            opacity: 0.8;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            padding: 6px;
        }

        .modal-body { padding: 24px; }

        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 14px 20px;
            background: #fafbfc;
        }

        .modal-body .form-label {
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-body .form-control {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
        }

        .modal-body .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .color-picker {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .color-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }

        .color-option:hover { transform: scale(1.1); }

        .color-option.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.4);
        }

        .color-option.selected::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
        }

        .color-option[data-color="1"] { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .color-option[data-color="2"] { background: linear-gradient(135deg, #10b981, #059669); }
        .color-option[data-color="3"] { background: linear-gradient(135deg, #f97316, #ea580c); }
        .color-option[data-color="4"] { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .color-option[data-color="5"] { background: linear-gradient(135deg, #ec4899, #db2777); }
        .color-option[data-color="6"] { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .color-option[data-color="7"] { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .color-option[data-color="8"] { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            margin-bottom: 16px;
        }

        .alert i { font-size: 1rem; }

        .badge-stock.in-stock {
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-tags"></i> 分类管理</h4>
    <button sec:authorize="hasRole('admin')" class="btn btn-primary" onclick="openAddModal()">
        <i class="fa-solid fa-plus"></i> 新增分类
    </button>
</div>

<div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="fa-solid fa-circle-check"></i> <span th:text="${msg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon blue">
            <i class="fa-solid fa-tags"></i>
        </div>
        <div class="stat-info">
            <div class="stat-value" th:text="${categories.size()}">0</div>
            <div class="stat-label">分类总数</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon green">
            <i class="fa-solid fa-box"></i>
        </div>
        <div class="stat-info">
            <div class="stat-value" th:text="${totalProducts}">0</div>
            <div class="stat-label">关联商品</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon orange">
            <i class="fa-solid fa-chart-pie"></i>
        </div>
        <div class="stat-info">
            <div class="stat-value" th:text="${avgProducts}">0</div>
            <div class="stat-label">平均商品数</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon purple">
            <i class="fa-solid fa-trending-up"></i>
        </div>
        <div class="stat-info">
            <div class="stat-value" th:text="${topCategoryName} ?: '-'">-</div>
            <div class="stat-label">最热分类</div>
        </div>
    </div>
</div>

<div class="card search-card">
    <div class="card-header">
        <i class="fa-solid fa-search"></i> 搜索条件
    </div>
    <div class="card-body">
        <form th:action="@{/category}" method="get">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">分类名称</label>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" class="form-control ps-4" name="keyword" th:value="${keyword}"
                               placeholder="输入分类名称搜索">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-search"></i> 查询
                        </button>
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="location.href='/category'">
                            <i class="fa-solid fa-rotate-right"></i> 重置
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="d-flex align-items-center gap-10">
            <i class="fa-solid fa-list"></i> 分类列表
            <span class="badge bg-primary ms-auto" th:text="'共 ' + ${categories.size()} + ' 个'" sec:if="${categories != null}">共 0 个</span>
        </div>
        <div class="view-toggle">
            <button class="view-btn active" id="gridViewBtn" onclick="switchView('grid')">
                <i class="fa-solid fa-grid-2"></i>
            </button>
            <button class="view-btn" id="listViewBtn" onclick="switchView('list')">
                <i class="fa-solid fa-list"></i>
            </button>
        </div>
    </div>
    
    <div class="card-body p-0">
        <div id="listView">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th style="width: 50px;">ID</th>
                        <th>分类名称</th>
                        <th style="width: 100px;">颜色标识</th>
                        <th style="width: 90px;">商品数量</th>
                        <th style="width: 140px;">创建时间</th>
                        <th style="width: 130px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fa-solid fa-tag"></i>
                                <p>暂无分类数据</p>
                                <small>点击上方"新增分类"按钮添加分类</small>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="c, stat : ${categories}">
                        <td th:text="${c.id}">1</td>
                        <td>
                            <span class="category-tag tag-color-1" th:classappend="'tag-color-' + ${stat.index % 8 + 1}">
                                <i class="fa-solid fa-tag"></i>
                                <span th:text="${c.name}">分类名称</span>
                            </span>
                        </td>
                        <td>
                            <div class="color-option selected"
                                 th:attr="data-color=${stat.index % 8 + 1}"
                                 style="width: 36px; height: 36px; margin: 0 auto;"></div>
                        </td>
                        <td>
                            <span class="badge-stock in-stock" th:text="${c.productCount}">0</span> 件
                        </td>
                        <td th:text="${c.createTime != null ? #temporals.format(c.createTime, 'yyyy-MM-dd HH:mm') : ''}">2026-01-01</td>
                        <td>
                            <div class="btn-group">
                                <button sec:authorize="hasRole('admin')"
                                        class="btn btn-sm btn-edit"
                                        th:attr="data-id=${c.id},data-name=${c.name},data-color=${stat.index % 8 + 1}"
                                        onclick="openEditModal(this.dataset.id, this.dataset.name, this.dataset.color)">
                                    <i class="fa-solid fa-pen"></i> 编辑
                                </button>
                                <button sec:authorize="hasRole('admin')"
                                        class="btn btn-sm btn-delete"
                                        th:attr="data-id=${c.id}"
                                        onclick="deleteCategory(this.dataset.id)">
                                    <i class="fa-solid fa-trash"></i> 删除
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="gridView" style="display: none;">
            <div class="category-grid" th:if="${!#lists.isEmpty(categories)}">
                <div th:each="c, stat : ${categories}" 
                     class="category-item" 
                     th:classappend="'color-' + ${stat.index % 8 + 1}">
                    <div class="category-icon">
                        <i class="fa-solid fa-tag"></i>
                    </div>
                    <div class="category-name" th:text="${c.name}">分类名称</div>
                    <div class="category-count" th:text="${c.productCount}">0</div> 件商品
                    <div class="category-date" th:text="${c.createTime != null ? #temporals.format(c.createTime, 'yyyy-MM-dd') : ''}">2026-01-01</div>
                    <div class="category-actions">
                        <button sec:authorize="hasRole('admin')"
                                class="btn btn-sm btn-edit"
                                th:attr="data-id=${c.id},data-name=${c.name},data-color=${stat.index % 8 + 1}"
                                onclick="openEditModal(this.dataset.id, this.dataset.name, this.dataset.color)">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button sec:authorize="hasRole('admin')"
                                class="btn btn-sm btn-delete"
                                th:attr="data-id=${c.id}"
                                onclick="deleteCategory(this.dataset.id)">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(categories)}" class="empty-state">
                <i class="fa-solid fa-tag"></i>
                <p>暂无分类数据</p>
                <small>点击上方"新增分类"按钮添加分类</small>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="categoryModalLabel">
                    <i class="fa-solid fa-tag"></i> 新增分类
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId" name="id">
                    <input type="hidden" id="categoryColor" name="color" value="1">
                    
                    <div class="mb-3">
                        <label for="categoryName" class="form-label">分类名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="categoryName" name="name"
                               placeholder="请输入分类名称（如：电子产品、服装鞋帽）" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">选择颜色标识</label>
                        <div class="color-picker">
                            <div class="color-option" data-color="1" onclick="selectColor(1)"></div>
                            <div class="color-option" data-color="2" onclick="selectColor(2)"></div>
                            <div class="color-option" data-color="3" onclick="selectColor(3)"></div>
                            <div class="color-option" data-color="4" onclick="selectColor(4)"></div>
                            <div class="color-option" data-color="5" onclick="selectColor(5)"></div>
                            <div class="color-option" data-color="6" onclick="selectColor(6)"></div>
                            <div class="color-option" data-color="7" onclick="selectColor(7)"></div>
                            <div class="color-option" data-color="8" onclick="selectColor(8)"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitCategory()">
                    <i class="fa-solid fa-check"></i> 保存
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    var categoryModal;

    document.addEventListener('DOMContentLoaded', function () {
        categoryModal = new bootstrap.Modal(document.getElementById('categoryModal'));
        selectColor(1);
    });

    function switchView(viewType) {
        var listView = document.getElementById('listView');
        var gridView = document.getElementById('gridView');
        var listBtn = document.getElementById('listViewBtn');
        var gridBtn = document.getElementById('gridViewBtn');
        
        if (viewType === 'grid') {
            listView.style.display = 'none';
            gridView.style.display = 'block';
            listBtn.classList.remove('active');
            gridBtn.classList.add('active');
        } else {
            listView.style.display = 'block';
            gridView.style.display = 'none';
            listBtn.classList.add('active');
            gridBtn.classList.remove('active');
        }
    }

    function selectColor(color) {
        document.getElementById('categoryColor').value = color;
        var options = document.querySelectorAll('.color-option');
        options.forEach(function(opt) {
            if (parseInt(opt.dataset.color) === color) {
                opt.classList.add('selected');
            } else {
                opt.classList.remove('selected');
            }
        });
    }

    function openAddModal() {
        document.getElementById('categoryModalLabel').innerHTML = '<i class="fa-solid fa-tag"></i> 新增分类';
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryId').value = '';
        selectColor(1);
        categoryModal.show();
    }

    function openEditModal(id, name, color) {
        document.getElementById('categoryModalLabel').innerHTML = '<i class="fa-solid fa-tag"></i> 编辑分类';
        document.getElementById('categoryId').value = id;
        document.getElementById('categoryName').value = name;
        selectColor(parseInt(color));
        categoryModal.show();
    }

    function submitCategory() {
        var form = document.getElementById('categoryForm');
        var data = new URLSearchParams();
        var id = document.getElementById('categoryId').value;
        var name = document.getElementById('categoryName').value;
        var color = document.getElementById('categoryColor').value;

        if (!name.trim()) {
            alert('请输入分类名称');
            return;
        }

        if (id) {
            data.append('id', id);
        }
        data.append('name', name.trim());
        data.append('color', color);

        fetch('/category/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: data.toString()
        })
        .then(function (response) {
            if (response.ok) {
                categoryModal.hide();
                location.reload();
            } else {
                return response.text().then(function (text) {
                    alert('保存失败：' + text);
                });
            }
        })
        .catch(function (error) {
            alert('网络错误：' + error.message);
        });
    }

    function deleteCategory(id) {
        if (!confirm('确认删除该分类？删除后相关商品的分类信息将变为空。')) {
            return;
        }

        fetch('/category/delete?id=' + id, { method: 'POST' })
        .then(function (response) {
            if (response.ok) {
                location.reload();
            } else {
                return response.text().then(function (text) {
                    alert('删除失败：' + text);
                });
            }
        })
        .catch(function (error) {
            alert('网络错误：' + error.message);
        });
    }
</script>

</body>
</html>
