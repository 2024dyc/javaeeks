<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id == null} ? '新增商品' : '编辑商品'">商品表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .card-body {
            padding: 28px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .form-label .required {
            color: #ef4444;
            margin-left: 2px;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 10px 24px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 10px 24px;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafbfc;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .upload-area:hover, .upload-area.drag-over {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.04);
        }

        .upload-placeholder p {
            margin: 8px 0 4px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .upload-placeholder small {
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .upload-icon {
            font-size: 2rem;
            color: var(--primary);
        }

        .upload-preview {
            max-width: 100%;
            max-height: 240px;
            object-fit: contain;
            border-radius: 8px;
        }

        .upload-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<div class="page-header">
    <h4>
        <i class="fa-solid fa-box"></i>
        <span th:text="${product.id == null} ? '新增商品' : '编辑商品'">新增商品</span>
    </h4>
</div>

<div class="card">
    <div class="card-body">
        <form th:action="@{/product/save}" method="post">
            <input type="hidden" name="id" th:if="${product.id != null}" th:value="${product.id}">

            <div class="row g-4">
                <div class="col-md-6">
                    <label for="name" class="form-label">
                        商品名称 <span class="required">*</span>
                    </label>
                    <input type="text" class="form-control" id="name" name="name"
                           th:value="${product.name}" placeholder="请输入商品名称" required>
                </div>

                <div class="col-md-6">
                    <label for="categoryId" class="form-label">
                        商品分类 <span class="required">*</span>
                    </label>
                    <select class="form-select" id="categoryId" name="categoryId" required>
                        <option value="">请选择分类</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${product.categoryId == c.id}">分类名称</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="price" class="form-label">
                        价格 <span class="required">*</span>
                    </label>
                    <input type="number" class="form-control" id="price" name="price"
                           th:value="${product.price}" step="0.01" min="0" placeholder="0.00" required>
                </div>

                <div class="col-md-6">
                    <label for="stock" class="form-label">
                        库存 <span class="required">*</span>
                    </label>
                    <input type="number" class="form-control" id="stock" name="stock"
                           th:value="${product.stock}" min="0" placeholder="0" required>
                </div>

                <div class="col-12">
                    <label for="description" class="form-label">描述</label>
                    <textarea class="form-control" id="description" name="description"
                              rows="3" th:text="${product.description}" placeholder="请输入商品描述"></textarea>
                </div>

                <div class="col-12">
                    <label class="form-label">商品图片</label>
                    <input type="hidden" id="image" name="image" th:value="${product.image}">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-placeholder" id="uploadPlaceholder"
                             th:style="${product.image != null and !#strings.isEmpty(product.image)} ? 'display:none' : ''">
                            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                            <p>点击或拖拽图片到此处上传</p>
                            <small>支持 JPG、PNG、GIF、WebP，最大 10MB</small>
                        </div>
                        <img class="upload-preview" id="imagePreview"
                             th:src="${product.image}"
                             th:style="${product.image != null and !#strings.isEmpty(product.image)} ? '' : 'display:none'"
                             alt="商品图片预览">
                        <input type="file" id="fileInput" accept="image/*" style="display:none">
                    </div>
                    <div class="upload-actions mt-2" id="uploadActions">
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('fileInput').click()">
                            <i class="fa-solid fa-folder-open"></i> 选择文件
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="urlModeBtn" onclick="showUrlInput()">
                            <i class="fa-solid fa-link"></i> 使用链接
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="removeImageBtn"
                                th:style="${product.image != null and !#strings.isEmpty(product.image)} ? '' : 'display:none'"
                                onclick="removeImage()">
                            <i class="fa-solid fa-trash"></i> 移除图片
                        </button>
                    </div>
                    <div class="url-input-row mt-2" id="urlInputRow" style="display:none;">
                        <div class="input-group">
                            <input type="text" class="form-control" id="imageUrlInput" placeholder="输入图片URL地址">
                            <button type="button" class="btn btn-outline-secondary" onclick="applyImageUrl()">确定</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-5">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-check"></i> 保存
                </button>
                <a href="/product" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');
    const imageHidden = document.getElementById('image');
    const removeImageBtn = document.getElementById('removeImageBtn');

    // 点击上传区域触发文件选择
    uploadArea.addEventListener('click', function(e) {
        if (e.target !== imagePreview) {
            fileInput.click();
        }
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
    });

    uploadArea.addEventListener('dragleave', function() {
        uploadArea.classList.remove('drag-over');
    });

    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            uploadFile(files[0]);
        }
    });

    // 文件选择
    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            uploadFile(this.files[0]);
        }
    });

    function uploadFile(file) {
        // 检查文件类型
        if (!file.type.match(/^image\/(jpeg|png|gif|bmp|webp)$/)) {
            alert('不支持的文件格式，仅支持 JPG/PNG/GIF/BMP/WebP');
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            alert('文件大小不能超过 10MB');
            return;
        }

        // 先本地预览
        const reader = new FileReader();
        reader.onload = function(e) {
            imagePreview.src = e.target.result;
            imagePreview.style.display = '';
            uploadPlaceholder.style.display = 'none';
        };
        reader.readAsDataURL(file);

        // 上传到服务器
        const formData = new FormData();
        formData.append('file', file);

        fetch('/product/uploadImage', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                imageHidden.value = data.url;
                removeImageBtn.style.display = '';
            } else {
                alert(data.message || '上传失败');
                // 恢复预览
                if (!imageHidden.value) {
                    imagePreview.style.display = 'none';
                    uploadPlaceholder.style.display = '';
                }
            }
        })
        .catch(err => {
            alert('上传失败: ' + err.message);
        });
    }

    function removeImage() {
        imageHidden.value = '';
        imagePreview.src = '';
        imagePreview.style.display = 'none';
        uploadPlaceholder.style.display = '';
        removeImageBtn.style.display = 'none';
    }

    function showUrlInput() {
        const row = document.getElementById('urlInputRow');
        if (row.style.display === 'none' || !row.style.display) {
            row.style.display = 'block';
            document.getElementById('imageUrlInput').value = imageHidden.value || '';
        } else {
            row.style.display = 'none';
        }
    }

    function applyImageUrl() {
        const url = document.getElementById('imageUrlInput').value.trim();
        if (url) {
            imageHidden.value = url;
            imagePreview.src = url;
            imagePreview.style.display = '';
            uploadPlaceholder.style.display = 'none';
            removeImageBtn.style.display = '';
        }
        document.getElementById('urlInputRow').style.display = 'none';
    }

    // 图片加载失败时显示占位
    imagePreview.addEventListener('error', function() {
        this.style.display = 'none';
        uploadPlaceholder.style.display = '';
    });
</script>

</body>
</html>
