<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.06);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header h4 {
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h4 i { color: var(--primary); font-size: 1.4rem; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: #fafbfc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header i { color: var(--primary); }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 20px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            color: #fff;
        }

        .btn-outline-secondary {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-weight: 500;
            padding: 8px 20px;
            transition: all 0.2s;
        }

        .btn-outline-secondary:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border-radius: 8px;
            font-weight: 500;
            padding: 8px 20px;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .btn-sm {
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.82rem;
            transition: all 0.2s;
        }

        .btn-add-cart {
            color: var(--success);
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .btn-add-cart:hover {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }

        .btn-edit {
            color: var(--primary);
            background: rgba(102, 126, 234, 0.06);
            border: 1px solid rgba(102, 126, 234, 0.15);
        }

        .btn-edit:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-delete {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .btn-view {
            color: var(--success);
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .btn-view:hover {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }

        .search-card .card-body {
            padding: 24px;
            background: #fafbfc;
        }

        .search-card .form-label {
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-card .form-control,
        .search-card .form-select {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.88rem;
            padding: 10px 14px;
            transition: all 0.2s;
            background: #fff;
            color: var(--text-primary);
        }

        .search-card .form-control:focus,
        .search-card .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
            outline: none;
        }

        .price-separator {
            display: flex;
            align-items: center;
            padding: 0 8px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .autocomplete-container { position: relative; }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            box-shadow: var(--shadow-lg);
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-list.show { display: block; }

        .autocomplete-item {
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.15s;
        }

        .autocomplete-item:last-child { border-bottom: none; }

        .autocomplete-item:hover {
            background: rgba(102, 126, 234, 0.05);
            padding-left: 18px;
        }

        .autocomplete-item img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 6px;
        }

        .autocomplete-item .item-name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.88rem;
        }

        .autocomplete-item .item-category {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .table { margin-bottom: 0; font-size: 0.88rem; }

        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px;
            white-space: nowrap;
        }

        .table tbody td {
            padding: 14px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-primary);
        }

        .table tbody tr:hover { background-color: #f8fafc; }

        .price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1rem;
        }

        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-img:hover { transform: scale(1.15); }

        .product-name-cell { min-width: 160px; }

        .product-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: block;
            font-size: 0.9rem;
        }

        .product-desc {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .badge-category {
            background: rgba(102, 126, 234, 0.06);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.78rem;
            font-weight: 500;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }

        .badge-stock {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-stock.in-stock {
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        .badge-stock.low-stock {
            background: rgba(245, 158, 11, 0.06);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        .badge-stock.out-of-stock {
            background: rgba(239, 68, 68, 0.06);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .empty-state small { font-size: 0.82rem; color: var(--text-muted); }

        .pagination-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #fafbfc;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }

        .pagination-info {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .pagination-info strong { color: var(--primary); }

        .pagination { margin: 0; }

        .page-link {
            border: none;
            border-radius: 6px;
            margin: 0 3px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 8px 14px;
            transition: all 0.15s;
            background: #f1f5f9;
        }

        .page-link:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
        }

        .page-item.active .page-link {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border-radius: 6px;
        }

        .page-item.disabled .page-link {
            background: #f8fafc;
            color: var(--text-muted);
        }

        .cache-status-bar {
            margin-top: 16px;
            padding: 12px 20px;
            background: #fafbfc;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.82rem;
        }

        .cache-status-bar .cache-label { color: var(--text-muted); font-weight: 500; }

        .cache-badge {
            padding: 4px 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .cache-redis {
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        .cache-mysql {
            background: rgba(245, 158, 11, 0.06);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        .cache-time { color: var(--text-muted); font-size: 0.75rem; }

        .modal-content {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border-radius: 12px 12px 0 0;
            padding: 20px;
            border-bottom: none;
        }

        .modal-header h5 {
            font-weight: 600;
            margin: 0;
            font-size: 1.1rem;
        }

        .modal-header .btn-close {
            color: #fff;
            opacity: 0.8;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            padding: 6px;
        }

        .modal-body { padding: 24px; }

        .product-detail-img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .product-detail-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .detail-item {
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .detail-item .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        .detail-item .value {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .detail-item .value.price {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .detail-description {
            margin-top: 16px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .detail-description .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .detail-description p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
            font-size: 0.88rem;
        }

        .btn-group { display: flex; gap: 6px; }

        .alert {
            border-radius: 8px;
            border: none;
            font-size: 0.88rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            color: var(--success);
            margin-bottom: 16px;
        }

        .alert i { font-size: 1rem; }
    </style>
</head>
<body>

<div class="page-header">
    <h4><i class="fa-solid fa-box"></i> 商品管理</h4>
    <div class="d-flex gap-2">
        <a sec:authorize="hasRole('admin')" href="/product/form" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> 新增商品
        </a>
        <button sec:authorize="hasRole('admin')" class="btn btn-danger" onclick="batchDelete()">
            <i class="fa-solid fa-trash-can"></i> 批量删除
        </button>
    </div>
</div>

<div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="fa-solid fa-circle-check"></i> <span th:text="${msg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="card search-card">
    <div class="card-header">
        <i class="fa-solid fa-search"></i> 搜索条件
    </div>
    <div class="card-body">
        <form th:action="@{/product}" method="get">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">商品名称</label>
                    <div class="autocomplete-container">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" class="form-control ps-4" name="keyword" id="keywordInput"
                               th:value="${keyword}" placeholder="输入商品名称搜索">
                        <div class="autocomplete-list" id="autocompleteList"></div>
                    </div>
                </div>

                <div class="col-md-3">
                    <label class="form-label">商品分类</label>
                    <select class="form-select" name="categoryId">
                        <option value="">全部分类</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${categoryId != null && categoryId == c.id}">分类名</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">价格区间</label>
                    <div class="d-flex align-items-center">
                        <input type="number" class="form-control" name="priceMin"
                               th:value="${priceMin}" placeholder="最低价" step="0.01" min="0">
                        <span class="price-separator">—</span>
                        <input type="number" class="form-control" name="priceMax"
                               th:value="${priceMax}" placeholder="最高价" step="0.01" min="0">
                    </div>
                </div>

                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-search"></i> 查询
                        </button>
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="location.href='/product'">
                            <i class="fa-solid fa-rotate-right"></i> 重置
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="fa-solid fa-list"></i> 商品列表
        <span class="badge bg-primary ms-auto" th:text="'共 ' + ${pageInfo.total} + ' 件'">共 0 件</span>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th style="width: 40px;">
                        <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
                    </th>
                    <th style="width: 70px;">图片</th>
                    <th>商品信息</th>
                    <th style="width: 90px;">分类</th>
                    <th style="width: 90px;">价格</th>
                    <th style="width: 70px;">库存</th>
                    <th style="width: 140px;">创建时间</th>
                    <th style="width: 130px;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(pageInfo.list)}">
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="fa-solid fa-box-open"></i>
                            <p>暂无商品数据</p>
                            <small>点击上方"新增商品"按钮添加商品</small>
                        </div>
                    </td>
                </tr>
                <tr th:each="p : ${pageInfo.list}">
                    <td>
                        <input type="checkbox" class="product-checkbox" th:value="${p.id}">
                    </td>
                    <td>
                        <img class="product-img"
                             th:src="${p.image != null and !p.image.isEmpty()} ? ${p.image} : @{/images/no-image.png}"
                             th:alt="${p.name}"
                             th:attr="data-id=${p.id},data-name=${p.name},data-price=${p.price},data-stock=${p.stock},data-category=${p.categoryName},data-desc=${p.description},data-image=${p.image}"
                             th:data-create="${p.createTime != null ? #temporals.format(p.createTime, 'yyyy-MM-dd HH:mm') : ''}"
                             th:data-update="${p.updateTime != null ? #temporals.format(p.updateTime, 'yyyy-MM-dd HH:mm') : ''}"
                             onclick="viewProductFromElement(this)">
                    </td>
                    <td class="product-name-cell">
                        <div class="product-name" th:text="${p.name}">商品名称</div>
                        <div class="product-desc" th:text="${p.description}">商品描述信息...</div>
                    </td>
                    <td>
                        <span class="badge-category" th:text="${p.categoryName}">分类</span>
                    </td>
                    <td class="price" th:text="'¥' + ${#numbers.formatDecimal(p.price, 1, 2)}">¥0.00</td>
                    <td>
                        <span class="badge-stock"
                              th:classappend="${p.stock > 10} ? 'in-stock' : (${p.stock > 0} ? 'low-stock' : 'out-of-stock')"
                              th:text="${p.stock}">0</span>
                    </td>
                    <td>
                        <small th:text="${p.createTime != null ? #temporals.format(p.createTime, 'yyyy-MM-dd HH:mm') : ''}">-</small>
                    </td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-view"
                                    th:attr="data-id=${p.id},data-name=${p.name},data-price=${p.price},data-stock=${p.stock},data-category=${p.categoryName},data-desc=${p.description},data-image=${p.image}"
                                    th:data-create="${p.createTime != null ? #temporals.format(p.createTime, 'yyyy-MM-dd HH:mm') : ''}"
                                    th:data-update="${p.updateTime != null ? #temporals.format(p.updateTime, 'yyyy-MM-dd HH:mm') : ''}"
                                    onclick="viewProductFromElement(this)">
                                <i class="fa-solid fa-eye"></i> 查看
                            </button>
                            <form th:action="@{/cart/add}" method="post" style="display:inline;"
                                  th:if="${p.stock > 0}">
                                <input type="hidden" name="productId" th:value="${p.id}">
                                <input type="hidden" name="quantity" value="1">
                                <button type="submit" class="btn btn-sm btn-add-cart">
                                    <i class="fa-solid fa-cart-plus"></i> 加入购物车
                                </button>
                            </form>
                            <button class="btn btn-sm btn-outline-secondary" disabled
                                    th:if="${p.stock <= 0}">
                                <i class="fa-solid fa-ban"></i> 已售罄
                            </button>
                            <a sec:authorize="hasRole('admin')"
                               th:href="@{/product/form(id=${p.id})}" class="btn btn-sm btn-edit">
                                <i class="fa-solid fa-pen"></i> 编辑
                            </a>
                            <a sec:authorize="hasRole('admin')"
                               th:href="@{/product/delete(id=${p.id})}"
                               class="btn btn-sm btn-delete"
                               onclick="return confirm('确认删除商品？')">
                                <i class="fa-solid fa-trash"></i> 删除
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination-wrapper" th:if="${pageInfo.total > 0}">
        <div class="pagination-info">
            共 <strong th:text="${pageInfo.total}">0</strong> 条记录，
            当前第 <strong th:text="${pageInfo.pageNum}">1</strong> / <strong th:text="${pageInfo.pages}">1</strong> 页
        </div>

        <nav>
            <ul class="pagination">
                <li class="page-item" th:classappend="${pageInfo.isFirstPage} ? 'disabled'">
                    <a class="page-link" th:if="${!pageInfo.isFirstPage}"
                       th:href="@{/product(keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax}, pageNum=1)}"
                       title="首页">
                        <i class="fa-solid fa-angles-left"></i>
                    </a>
                    <span class="page-link" th:if="${pageInfo.isFirstPage}" title="首页">
                        <i class="fa-solid fa-angles-left"></i>
                    </span>
                </li>

                <li class="page-item" th:classappend="${pageInfo.isFirstPage} ? 'disabled'">
                    <a class="page-link" th:if="${!pageInfo.isFirstPage}"
                       th:href="@{/product(keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax}, pageNum=${pageInfo.pageNum - 1})}"
                       title="上一页">
                        <i class="fa-solid fa-angle-left"></i>
                    </a>
                    <span class="page-link" th:if="${pageInfo.isFirstPage}" title="上一页">
                        <i class="fa-solid fa-angle-left"></i>
                    </span>
                </li>

                <li class="page-item"
                    th:each="num : ${pageInfo.navigatepageNums}"
                    th:classappend="${num == pageInfo.pageNum} ? 'active'">
                    <a class="page-link" th:text="${num}"
                       th:href="@{/product(keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax}, pageNum=${num})}">
                        1
                    </a>
                </li>

                <li class="page-item" th:classappend="${pageInfo.isLastPage} ? 'disabled'">
                    <a class="page-link" th:if="${!pageInfo.isLastPage}"
                       th:href="@{/product(keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax}, pageNum=${pageInfo.pageNum + 1})}"
                       title="下一页">
                        <i class="fa-solid fa-angle-right"></i>
                    </a>
                    <span class="page-link" th:if="${pageInfo.isLastPage}" title="下一页">
                        <i class="fa-solid fa-angle-right"></i>
                    </span>
                </li>

                <li class="page-item" th:classappend="${pageInfo.isLastPage} ? 'disabled'">
                    <a class="page-link" th:if="${!pageInfo.isLastPage}"
                       th:href="@{/product(keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax}, pageNum=${pageInfo.pages})}"
                       title="尾页">
                        <i class="fa-solid fa-angles-right"></i>
                    </a>
                    <span class="page-link" th:if="${pageInfo.isLastPage}" title="尾页">
                        <i class="fa-solid fa-angles-right"></i>
                    </span>
                </li>
            </ul>
        </nav>
    </div>
</div>

<div class="cache-status-bar" th:if="${cacheSource != null}">
    <div class="d-flex align-items-center gap-3">
        <span class="cache-label">数据来源：</span>
        <span class="cache-badge" th:classappend="${cacheSource == 'Redis'} ? 'cache-redis' : 'cache-mysql'"
              th:text="${cacheSource}">MySQL</span>
        <span class="cache-time" th:text="'刷新时间：' + ${cacheTime}">刷新时间</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const imageBaseUrl = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image';

    function getImageUrl(name) {
        const prompt = encodeURIComponent(name + ' product photo on white background, professional studio lighting, high quality');
        return `${imageBaseUrl}?prompt=${prompt}&image_size=square`;
    }

    function toggleSelectAll() {
        const selectAll = document.getElementById('selectAll');
        const checkboxes = document.querySelectorAll('.product-checkbox');
        checkboxes.forEach(cb => cb.checked = selectAll.checked);
    }

    function batchDelete() {
        const checked = document.querySelectorAll('.product-checkbox:checked');
        if (checked.length === 0) {
            alert('请先选择要删除的商品');
            return;
        }
        if (!confirm('确认删除选中的 ' + checked.length + ' 个商品？')) return;
        const ids = Array.from(checked).map(cb => cb.value);
        const form = document.createElement('form');
        form.method = 'post';
        form.action = '/product/batchDelete';
        ids.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = id;
            form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
    }

    function viewProductFromElement(el) {
        var id = el.getAttribute('data-id');
        var name = el.getAttribute('data-name');
        var price = el.getAttribute('data-price');
        var stock = el.getAttribute('data-stock');
        var category = el.getAttribute('data-category');
        var description = el.getAttribute('data-desc');
        var image = el.getAttribute('data-image');
        var createTime = el.getAttribute('data-create') || '';
        var updateTime = el.getAttribute('data-update') || '';
        
        document.getElementById('modalProductId').textContent = '#' + id;
        document.getElementById('modalProductName').textContent = name;
        document.getElementById('modalProductPrice').textContent = '¥' + parseFloat(price).toFixed(2);
        document.getElementById('modalProductStock').textContent = stock + ' 件';
        document.getElementById('modalProductCategory').textContent = category;
        document.getElementById('modalProductDescription').textContent = description || '暂无描述';
        document.getElementById('modalProductCreateTime').textContent = createTime || '-';
        document.getElementById('modalProductUpdateTime').textContent = updateTime || '-';
        document.getElementById('modalProductImage').src = (image && image !== 'null' && image !== '') ? image : getImageUrl(name);
        document.getElementById('modalEditLink').href = '/product/form?id=' + id;
        var modal = new bootstrap.Modal(document.getElementById('productModal'));
        modal.show();
    }

    const keywordInput = document.getElementById('keywordInput');
    const autocompleteList = document.getElementById('autocompleteList');
    const productNames = [
        'iPhone 15 Pro Max', 'MacBook Pro 14寸', 'iPad Air 6代',
        'AirPods Pro 2', 'Apple Watch Ultra 2', '小米14 Pro',
        '华为Mate60 Pro', 'OPPO Find X7', 'vivo X100',
        '三星Galaxy S24', '索尼WH-1000XM5', 'Bose QuietComfort',
        '戴森V15 Detect', '美的空调KFR-72LW', '海尔冰箱BCD-500W',
        '格力空调云锦Ⅱ', '九阳豆浆机DJ13B', '苏泊尔电饭煲SF50HC',
        '飞利浦剃须刀S9000', '飞科剃须刀FS923', '罗技MX Master 3',
        '雷蛇炼狱蝰蛇V3', '机械键盘IKBC C87', '漫步者LolliPods Pro',
        '小米手环8', '华为手表Watch GT4', '荣耀Magic6 Pro',
        '一加12', '真我GT5 Pro', '红米K70',
        '华硕ROG Phone 8', '黑鲨5 Pro', '联想拯救者Y9000X',
        '戴尔XPS 15', '惠普暗影精灵9', '宏碁掠夺者战斧18',
        '外星人m15 R7', 'ROG冰刃7双屏', 'ThinkPad X1 Carbon',
        'Surface Laptop 6', '华为MateBook X Pro', '小米笔记本Pro 16',
        'iPhone 15', 'iPhone 15 Pro', 'iPhone 15 Plus',
        'iPad Pro 12.9', 'iPad mini 6', 'MacBook Air M3',
        'Mac mini M3', 'Mac Studio M3 Max', 'Apple TV 4K',
        'HomePod mini', 'AirTag 4件装', 'MagSafe充电器',
        'Apple Pencil 2代', '妙控键盘', 'Magic Mouse 2',
        'AirPods 3', 'Beats Studio Buds+', 'Powerbeats Pro',
        'Fitbit Sense 2', 'Garmin Fenix 7', 'Polar Vantage V3',
        'TicWatch Pro 5', 'Amazfit GTS 4', 'Huawei Band 8',
        'Redmi Watch 3', 'Realme Watch S2', 'Oppo Watch X',
        '三星Galaxy Watch6', '一加手表2', '荣耀手表4',
        '小米电视S Pro 85', 'TCL Mini LED', '海信U8H',
        '创维Q53 Pro', '索尼A80L', 'LG C3 OLED',
        '三星QN900C', 'Xbox Series X', 'PlayStation 5',
        'Switch OLED', 'PS5 Slim', 'Xbox Series S', 'Steam Deck OLED'
    ];

    keywordInput.addEventListener('input', function() {
        const value = this.value.trim().toLowerCase();
        if (!value) {
            autocompleteList.classList.remove('show');
            return;
        }

        const matches = productNames.filter(name => name.toLowerCase().includes(value)).slice(0, 6);
        
        if (matches.length === 0) {
            autocompleteList.classList.remove('show');
            return;
        }

        autocompleteList.innerHTML = matches.map(name => `
            <div class="autocomplete-item" onclick="selectProduct('${name}')">
                <img src="${getImageUrl(name)}" alt="${name}" loading="lazy">
                <div>
                    <div class="item-name">${name}</div>
                    <div class="item-category">商品</div>
                </div>
            </div>
        `).join('');
        autocompleteList.classList.add('show');
    });

    function selectProduct(name) {
        keywordInput.value = name;
        autocompleteList.classList.remove('show');
    }

    document.addEventListener('click', function(e) {
        if (!keywordInput.contains(e.target) && !autocompleteList.contains(e.target)) {
            autocompleteList.classList.remove('show');
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.product-img').forEach(img => {
            if (!img.src || img.src.indexOf('no-image') !== -1) {
                const name = img.alt;
                img.src = getImageUrl(name);
            }
        });
    });
</script>

</body>
</html>
