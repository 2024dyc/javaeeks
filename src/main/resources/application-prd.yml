# ==================== 生产环境配置 ====================
server:
  port: 80

spring:
  # 数据源配置（请修改为你自己的数据库名）
  datasource:
    url: jdbc:mysql://129.204.142.57:3306/2024dyc?useUnicode=true&characterEncoding=utf-8&useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: Bigdata22!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Thymeleaf 配置
  thymeleaf:
    cache: true               # 生产环境开启缓存，提升性能
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 5000ms

  # Spring Cache 配置（生产环境缓存更长）
  cache:
    type: redis
    redis:
      time-to-live: 1800000      # 30 分钟
      use-key-prefix: true
      cache-null-values: false

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartshop.entity
  configuration:
    map-underscore-to-camel-case: true

# PageHelper 分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# 日志级别
logging:
  level:
    com.smartshop: info
    org.springframework.security: warn