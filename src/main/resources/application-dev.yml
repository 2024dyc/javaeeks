# ==================== 开发环境配置 ====================
server:
  port: 9090

upload:
  path: ${user.dir}/uploads

spring:
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  # 数据源配置（请修改为你自己的数据库名）
  datasource:
    url: jdbc:mysql://129.204.142.57:3306/0424dcy?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: Bigdata22!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Thymeleaf 配置
  thymeleaf:
    cache: false              # 开发环境关闭缓存，方便调试
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 5000ms

  # Spring Cache 配置（开发环境使用内存缓存，无需 Redis）
  cache:
    type: simple

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartshop.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper 分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# 日志级别
logging:
  level:
    com.smartshop: debug
    org.springframework.security: debug